name: portable_ai_flutter
description: "Agentic AI - Local AI assistant with device control and coding tools."
publish_to: 'none'
version: 2.0.0+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # - LLM Engine
  llamadart: ^0.8.14

  # - State Management
  get: ^4.7.2

  # - Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3

  # - Networking / Downloads
  http: ^1.2.2

  # - File System
  path_provider: ^2.1.5
  path: ^1.9.1
  file_picker: ^8.1.7

  # - UI Helpers
  flutter_markdown: ^0.7.6
  google_fonts: ^6.2.1
  percent_indicator: ^4.2.4
  flutter_animate: ^4.5.0
  cupertino_icons: ^1.0.8

  # - Background / Wake Lock
  wakelock_plus: ^1.2.10
  flutter_foreground_task: ^9.2.2
  disable_battery_optimization: ^1.1.1

  # === AGENTIC AI ADDITIONS ===

  # - Voice (STT + TTS)
  speech_to_text: ^7.0.0
  flutter_tts: ^4.2.2

  # - Memory / Database
  sqflite: ^2.4.2
  sqlite3_flutter_libs: ^0.5.32

  # - Code Display
  flutter_highlight: ^0.7.0
  highlight: ^0.7.0

  # - UI Effects
  shimmer: ^3.0.0
  lottie: ^3.3.1

  # - Device Info
  device_info_plus: ^11.4.0
  android_intent_plus: ^5.3.0

  # - Utilities
  uuid: ^4.5.1
  intl: ^0.20.2
  dio: ^5.8.0+1
  protobuf: ^4.0.0
  image: ^4.1.0
  permission_handler: ^11.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.13
  flutter_lints: ^6.0.0

hooks:
  user_defines:
    llamadart:
      llamadart_native_backends:
        platforms:
          linux-x64: [vulkan]
          windows-x64: [vulkan]
          android-arm64: [cpu, vulkan, opencl]

flutter:
  uses-material-design: true
  assets:
    - assets/models_catalog.json
